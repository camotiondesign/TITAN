name: Weekly Pharmacy News Scan

on:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday at 7am UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4

      - name: Run pharmacy news scan
        run: python scripts/pharmacy-news-scan.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analytics/weekly-news-scan.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly pharmacy news scan $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
